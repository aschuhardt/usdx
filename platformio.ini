[env:ATmega328P]
platform = atmelavr
board = ATmega328P
board_build.f_mcu = 20000000L
framework = arduino

; upload
upload_protocol = custom
upload_port = usb
upload_speed = 115200
upload_flags = 
    -e
    -C
    ${platformio.packages_dir}/tool-avrdude/avrdude.conf
    -p
    $BOARD_MCU
    -P
    $UPLOAD_PORT
    -c
    stk500v2
upload_command = avrdude $UPLOAD_FLAGS -U flash:w:$SOURCE:i